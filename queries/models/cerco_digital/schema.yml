              meta:
                description: "Verifica se latitude_equip_lpr não é nulo"

      - name: longitude_equip_lpr
        description: "Longitude do ponto de coleta (equipamento LPR)."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
