          - not_null:
              name: radar__codigo_contrato__not_null

      - name: codcet
        description: "Código identificador do radar."
        constraints:
          - type: primary_key
        data_tests:
          - not_null:
              name: radar__codcet__not_null
          - unique:
              name: radar__codcet__unique
          - dbt_expectations.expect_column_value_lengths_to_equal:
              name: radar__codcet__length_equal_10
