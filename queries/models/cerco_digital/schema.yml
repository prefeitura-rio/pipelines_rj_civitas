      **Descrição**: Tabela que relaciona os radares com as câmeras mais próximas.
      **Frequência de atualização**: Diária
      **Origem**: rj-cetrio.ocr_radar.radar_cameras_proximas
      **Publicado por**: Nicolas Evilasio
      **Publicado por (email)**: nicolas.evilasio@prefeitura.rio
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - codcet
            - id_camera

    columns:
      - name: codcet
        description: "Código identificador do radar."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              name: radares_cameras_proximas__codcet__not_null
              meta:
                description: "Verifica se codcet não é nulo"

      - name: local
        description: "Local do radar."

      - name: bairro
