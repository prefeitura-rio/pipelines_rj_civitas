              name: radares_cameras_proximas__latitude_radar__not_null
              meta:
                description: "Verifica se latitude_radar não é nulo"

      - name: longitude_radar
        description: "Longitude do radar."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              name: radares_cameras_proximas__longitude_radar__not_null
              meta:
                description: "Verifica se longitude_radar não é nulo"

      - name: id_camera
        description: "Código identificador da câmera."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              name: radares_cameras_proximas__id_camera__not_null
              meta:
                description: "Verifica se id_camera não é nulo"

      - name: nome_camera
        description: "Nome da câmera."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              name: radares_cameras_proximas__nome_camera__not_null
              meta:
                description: "Verifica se nome_camera não é nulo"

      - name: streaming_url
        description: "URL de streaming da câmera."

      - name: latitude
        description: "Latitude da câmera."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              name: radares_cameras_proximas__latitude__not_null
              meta:
                description: "Verifica se latitude não é nulo"

      - name: longitude
        description: "Longitude da câmera."
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              name: radares_cameras_proximas__longitude__not_null
              meta:
                description: "Verifica se longitude não é nulo"

      - name: distance
        description: "Distância entre o radar e a câmera."

      - name: rank
        description: "Rank da câmera."

  - name: ponto_coleta_lpr_camera_proxima
    description: |
      **Descrição**: Tabela que relaciona pontos de coleta (equipamentos LPR) às câmeras mais próximas.
