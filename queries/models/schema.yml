  - name: ocr_radar
    database: rj-cetrio
    schema: ocr_radar
    tables:
      - name: readings_2024
        identifier: readings_2024_*
      - name: all_readings_raw
        identifier: readings_*
        tests:
          - dbt_utils.expression_is_true:
              name: all_readings_raw__camera_numero_and_coordinates_not_mutually_empty
              expression: |
                (camera_numero IS NOT NULL AND camera_numero NOT IN ('', '0')) OR
                (camera_latitude != 0.0 AND camera_longitude != 0.0)
              config:
                severity: warn
                where: "datahora >= '{{ var('start_date') }}'"
        columns:
          - name: datahora_captura
            #tests:
              #- dbt_expectations.expect_column_values_to_not_be_null:
               #   name: all_readings_raw__datahora_captura__not_null
                #  where: "datahora >= '{{ var('start_date') }}'"
          - name: placa
            tests:
              - dbt_expectations.expect_column_values_to_not_be_null:
                  name: all_readings_raw__placa__not_null
                  where: "datahora >= '{{ var('start_date') }}'"
                  config:
                    severity: warn
              #- dbt_expectations.expect_column_values_to_not_be_in_set:
               #   name: all_readings_raw__placa__not_empty_or_zero_or_dashes
                #  value_set: ["", "0", "-------"]
                 # where: "datahora >= '{{ var('start_date') }}'"
                  #config:
                   # severity: warn
              - dbt_expectations.expect_column_value_lengths_to_equal:
                  name: all_readings_raw__placa__length_equals_7
                  config:
                    severity: warn
                  value: 7
                  where: "placa IS NOT NULL AND placa != '' AND datahora >= '{{ var('start_date') }}'"
              - dbt_expectations.expect_column_values_to_match_regex_list:
                  name: all_readings_raw__placa__brazilian_or_mercosul_pattern
                  regex_list: [
                     "^[A-Z-]{3}[0-9-]{4}$",  # Padrão antigo + parcial: AAA1111 ou AB-12--
                     "^[A-Z-]{3}[0-9-][A-Z-][0-9-]{2}$"  # Padrão Mercosul + parcial: AAA1A23 ou A--1-2-
                  ]
                  match_on: any
                  where: "placa IS NOT NULL AND placa != '' AND datahora >= '{{ var('start_date') }}'"
                  is_raw: True
                  flags: i
                  config:
                    severity: warn

          - name: tipoveiculo
          - name: velocidade
          - name: datahora
          - name: camera_numero
            tests:
              #- dbt_expectations.expect_column_values_to_not_be_null:
               #   name: all_readings_raw__camera_numero__not_null
                #  where: "datahora >= '{{ var('start_date') }}'"
              #- dbt_expectations.expect_column_values_to_not_be_in_set:
               #   name: all_readings_raw__camera_numero__not_empty_or_zero
                #  value_set: ["", "0", 0]
                 # where: "datahora >= '{{ var('start_date') }}'"
              - dbt_expectations.expect_column_values_to_match_regex:
                  name: all_readings_raw__camera_numero__only_numbers
                  regex: "^[0-9]+$"
                  where: "datahora >= '{{ var('start_date') }}'"
                  config:
                    severity: warn

              #- relationships:
               #   name: all_readings_raw__camera_numero__exists_in_equipamento
                #  to: source('ocr_radar', 'equipamento')
                 # field: codcet
                  #where: "datahora >= '{{ var('start_date') }}' AND NOT REGEXP_CONTAINS(camera_numero, r'[a-zA-Z]')"

          - name: camera_latitude
          - name: camera_longitude
          - name: empresa

      - name: equipamento
      - name: equipamento_codcet_to_camera_numero
      - name: tipoveiculo_mapping

